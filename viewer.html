<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TRPG繝ｭ繧ｰ謨ｴ蠖｢繝・・繝ｫ (Web迚・</title>
  <style>
    :root {
      --bg-a: #f7f1dc;
      --bg-b: #f9d8b6;
      --panel: #fffaf0;
      --ink: #2f2a22;
      --accent: #d67d53;
      --line: #cdb79f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Meiryo", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 20%, #ffe8c8 0 18%, transparent 19%),
        radial-gradient(circle at 85% 75%, #ffd8be 0 14%, transparent 15%),
        linear-gradient(145deg, var(--bg-a), var(--bg-b));
      min-height: 100vh;
    }
    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 16px;
      padding: 16px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .panel {
      background: color-mix(in srgb, var(--panel) 95%, #fff);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 10px 20px rgba(0,0,0,.06);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 18px;
      letter-spacing: .03em;
    }
    h2 {
      margin: 12px 0 8px;
      font-size: 14px;
    }
    .hint {
      font-size: 12px;
      color: #645848;
      margin: 4px 0;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    button, .file-label {
      border: 1px solid #b79f85;
      background: #fff;
      color: var(--ink);
      border-radius: 10px;
      padding: 7px 10px;
      font-size: 13px;
      cursor: pointer;
    }
    .file-label {
      display: inline-block;
      margin-bottom: 6px;
    }
    #fileName {
      margin-top: 4px;
      word-break: break-all;
    }
    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: #ba6843;
    }
    button:disabled {
      opacity: .5;
      cursor: default;
    }
    .scroll {
      max-height: 180px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      background: #fffcf7;
    }
    .attr-item {
      display: flex;
      gap: 6px;
      align-items: center;
      margin: 4px 0;
      font-size: 13px;
    }
    .char-list {
      max-height: 260px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      background: #fffcf7;
    }
    .char-row {
      display: grid;
      grid-template-columns: auto 1fr auto auto auto;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px dashed #d9c8b5;
    }
    .char-toggle {
      width: 16px;
      height: 16px;
      margin: 0;
    }
    .char-row:last-child { border-bottom: none; }
    .char-name {
      font-size: 13px;
      word-break: break-all;
    }
    .icon-thumb {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid #bfa98f;
      object-fit: cover;
      background: #fff;
    }
    .viewer-wrap {
      position: relative;
      min-height: calc(100vh - 32px);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .viewer-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }
    .stage {
      flex: 0 0 auto;
      height: clamp(420px, 68vh, 760px);
      position: relative;
      border: 2px solid #d2bc9f;
      border-radius: 18px;
      background:
        linear-gradient(160deg, rgba(255,255,255,.72), rgba(255,249,237,.9)),
        repeating-linear-gradient(45deg, rgba(255,255,255,.25), rgba(255,255,255,.25) 10px, rgba(250,241,224,.25) 10px, rgba(250,241,224,.25) 20px);
      overflow-y: auto;
      overflow-x: hidden;
      cursor: pointer;
    }
    .stage-note {
      position: absolute;
      top: 10px;
      right: 12px;
      font-size: 12px;
      color: #6f5f4c;
      opacity: .8;
      pointer-events: none;
    }
    .log-flow {
      position: relative;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 18px;
    }
    .entry {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      width: 100%;
      animation: rise .14s ease;
    }
    .entry-avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid #f4e3cc;
      object-fit: cover;
      background: #fff;
      flex-shrink: 0;
    }
    .bubble {
      max-width: min(720px, 90%);
      border-radius: 16px;
      border: 2px solid var(--line);
      background: #fff;
      padding: 12px 14px;
      position: relative;
      box-shadow: 0 8px 16px rgba(0,0,0,.08);
    }
    .meta {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 6px;
      font-size: 12px;
    }
    .tag {
      background: #f1e5d7;
      border: 1px solid #ddc9b2;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 11px;
    }
    .name {
      font-weight: 700;
      font-size: 13px;
    }
    .line {
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 18px;
      min-height: 2.5em;
    }
    .entry.narration {
      justify-content: center;
    }
    .entry.narration .entry-avatar {
      display: none;
    }
    .narration {
      margin: 0 auto;
      max-width: 860px;
      text-align: center;
      border-style: dashed;
      background: #fffefb;
    }
    @keyframes rise {
      from { opacity: .4; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .viewer-foot {
      display: flex;
      justify-content: center;
      gap: 10px;
    }
    #fileInput { display: none; }
    .empty {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 16px;
      color: #6d5f4e;
      text-align: center;
      padding: 20px;
    }
    @media (max-width: 960px) {
      .layout { grid-template-columns: 1fr; }
      .viewer-wrap { min-height: 60vh; }
      .stage { height: 58vh; }
      .entry-avatar { width: 74px; height: 74px; }
      .line { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="panel">
      <h1>TRPG繝ｭ繧ｰ謨ｴ蠖｢繝・・繝ｫ</h1>
      <label class="file-label" for="fileInput">繝ｭ繧ｰ繝輔ぃ繧､繝ｫ繧帝∈謚・/label>
      <input id="fileInput" type="file" accept=".txt,.log,.html,.htm">
      <div id="fileName" class="hint">譛ｪ驕ｸ謚・/div>
      <div id="loadStatus" class="hint"></div>
      <div class="toolbar">
        <button id="exportBtn" class="primary" disabled>HTML繧貞・蜉・/button>
        <button id="pdfBtn" disabled>PDF繧貞・蜉・/button>
      </div>

      <h2>螻樊ｧ繝輔ぅ繝ｫ繧ｿ</h2>
      <div class="toolbar">
        <button id="allOnBtn" disabled>蜈ｨ驕ｸ謚・/button>
        <button id="allOffBtn" disabled>蜈ｨ隗｣髯､</button>
      </div>
      <div id="attributesBox" class="scroll"></div>

      <h2>繧ｭ繝｣繝ｩ繧ｯ繧ｿ繝ｼ險ｭ螳・/h2>
      <div class="hint">濶ｲ縺ｨ繧｢繧､繧ｳ繝ｳ縺ｯ蜃ｺ蜉姨TML縺ｫ繧ょ沂繧∬ｾｼ縺ｾ繧後∪縺吶・/div>
      <div id="charactersBox" class="char-list"></div>
    </aside>

    <main class="panel viewer-wrap">
      <div class="viewer-head">
        <div id="progress">0 / 0</div>
        <div class="hint">繧ｿ繝・・繝ｻ繧ｯ繝ｪ繝・け繝ｻ竊偵〒谺｡縺ｸ / 竊舌〒謌ｻ繧・/div>
      </div>
      <section id="stage" class="stage" tabindex="0">
        <div class="stage-note">Next 笆ｶ</div>
        <div id="emptyState" class="empty">蟾ｦ縺ｮ縲後Ο繧ｰ繝輔ぃ繧､繝ｫ繧帝∈謚槭阪°繧芽ｪｭ縺ｿ霎ｼ繧薙〒縺上□縺輔＞縲・/div>
        <div id="logFlow" class="log-flow" hidden></div>
      </section>
      <div class="viewer-foot">
        <button id="prevBtn" disabled>笳 謌ｻ繧・/button>
        <button id="nextBtn" disabled>谺｡縺ｸ 笆ｶ</button>
      </div>
    </main>
  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const fileName = document.getElementById("fileName");
    const loadStatus = document.getElementById("loadStatus");
    const attributesBox = document.getElementById("attributesBox");
    const charactersBox = document.getElementById("charactersBox");
    const exportBtn = document.getElementById("exportBtn");
    const pdfBtn = document.getElementById("pdfBtn");
    const allOnBtn = document.getElementById("allOnBtn");
    const allOffBtn = document.getElementById("allOffBtn");
    const stage = document.getElementById("stage");
    const emptyState = document.getElementById("emptyState");
    const logFlow = document.getElementById("logFlow");
    const progress = document.getElementById("progress");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    const defaultAvatar =
      "data:image/svg+xml;base64," +
      btoa(unescape(encodeURIComponent(
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">' +
        '<rect width="64" height="64" fill="#f5e7d3"/>' +
        '<circle cx="32" cy="24" r="12" fill="#d4b896"/>' +
        '<rect x="16" y="40" width="32" height="16" rx="8" fill="#d4b896"/>' +
        "</svg>"
      )));

    let entries = [];
    let filteredEntries = [];
    let activeAttrs = new Set();
    let charMap = {};
    let cursor = 0;

    fileInput.addEventListener("change", async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      try {
        const text = await readTextWithEncoding(file);
        fileName.textContent = file.name;
        bootFromLog(text, file.name);
      } catch (error) {
        loadStatus.textContent = `隱ｭ霎ｼ繧ｨ繝ｩ繝ｼ: ${error?.message || error}`;
      }
    });

    allOnBtn.addEventListener("click", () => {
      const keys = Object.keys(getAttributeCounts());
      activeAttrs = new Set(keys);
      renderAttributeFilters();
      applyFiltersAndRender();
    });

    allOffBtn.addEventListener("click", () => {
      activeAttrs = new Set();
      renderAttributeFilters();
      applyFiltersAndRender();
    });

    prevBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      moveCursor(-1);
    });
    nextBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      moveCursor(1);
    });

    stage.addEventListener("click", () => moveCursor(1));

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight") moveCursor(1);
      if (event.key === "ArrowLeft") moveCursor(-1);
    });

    exportBtn.addEventListener("click", () => {
      if (!entries.length) return;
      const payload = { entries, charMap, activeAttrs: Array.from(activeAttrs) };
      const html = buildExportHtml(payload);
      const blob = new Blob([html], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "trpg-comic-viewer.html";
      a.click();
      URL.revokeObjectURL(url);
    });

    pdfBtn.addEventListener("click", () => {
      if (!filteredEntries.length) return;
      const oldLabel = pdfBtn.textContent;
      pdfBtn.disabled = true;
      pdfBtn.textContent = "PDF貅門ｙ荳ｭ...";
      const win = window.open("", "_blank");
      if (!win) {
        pdfBtn.disabled = false;
        pdfBtn.textContent = oldLabel;
        return;
      }
      win.document.write(buildPrintHtml(filteredEntries, charMap));
      win.document.close();
      win.addEventListener("load", () => {
        pdfBtn.disabled = false;
        pdfBtn.textContent = oldLabel;
      }, { once: true });
    });

    function bootFromLog(text, name = "") {
      entries = parseAnyLog(text, name);
      charMap = buildCharacterMap(entries);
      const attrs = Object.keys(getAttributeCounts());
      activeAttrs = new Set(attrs);
      cursor = 0;
      renderAttributeFilters();
      renderCharacterSettings();
      applyFiltersAndRender();
      const hasEntries = entries.length > 0;
      exportBtn.disabled = !hasEntries;
      pdfBtn.disabled = !hasEntries;
      allOnBtn.disabled = attrs.length === 0;
      allOffBtn.disabled = attrs.length === 0;
      const chars = Object.keys(charMap).length;
      loadStatus.textContent = `隱ｭ縺ｿ霎ｼ縺ｿ: ${entries.length}莉ｶ / 螻樊ｧ:${attrs.length} / 繧ｭ繝｣繝ｩ:${chars}`;
    }

    async function readTextWithEncoding(file) {
      const bytes = await file.arrayBuffer();
      const utf8 = new TextDecoder("utf-8", { fatal: false }).decode(bytes);
      if (looksMojibake(utf8)) {
        try {
          const sjis = new TextDecoder("shift_jis", { fatal: false }).decode(bytes);
          if (!looksMojibake(sjis)) return sjis;
        } catch (_) {}
      }
      return utf8;
    }

    function looksMojibake(text) {
      if (!text) return false;
      return (text.match(/\uFFFD/g) || []).length >= 2;
    }

    function parseAnyLog(raw, name = "") {
      const isHtmlFile = /\.(html?|xhtml)$/i.test(name);
      const looksHtml = /<html[\s>]|<body[\s>]|<p[\s>]|<\/p>/i.test(raw);
      if (isHtmlFile || looksHtml) {
        const htmlEntries = parseHtmlLog(raw);
        if (htmlEntries.length) return htmlEntries;
        const stripped = raw
          .replace(/<br\s*\/?>/gi, "\n")
          .replace(/<\/p>/gi, "\n")
          .replace(/<[^>]+>/g, "");
        const textFallback = parseLog(stripped);
        if (textFallback.length) return textFallback;
      }
      return parseLog(raw);
    }

    function parseHtmlLog(raw) {
      const doc = new DOMParser().parseFromString(raw, "text/html");
      const pNodes = Array.from(doc.querySelectorAll("p"));
      const out = [];
      const normalizeAttr = (s) => (s || "").replace(/[\[\]]/g, "").trim() || "NO_ATTR";
      const normalizeSpeaker = (s) => normalizeSpeakerName(s);

      for (const p of pNodes) {
        const sourceColor = parseCssColorFromStyle(p.getAttribute("style") || "");
        const spans = Array.from(p.querySelectorAll("span"))
          .map((s) => s.textContent?.trim() || "")
          .filter(Boolean);
        let attr = "", speaker = "", text = "";
        if (spans.length >= 3) {
          attr = normalizeAttr(spans[0]);
          speaker = normalizeSpeaker(spans[1]);
          text = spans.slice(2).join("\n").trim();
        } else {
          const plain = (p.textContent || "").trim().replace(/\s+/g, " ");
          const m = plain.match(/^\[([^\]]+)\]\s*(.+?)\s*[:・咯\s*(.*)$/);
          if (m) {
            attr = normalizeAttr(m[1]);
            speaker = normalizeSpeaker(m[2]);
            text = (m[3] || "").trim();
          } else if (plain) {
            const am = plain.match(/^\[([^\]]+)\]\s*(.*)$/);
            if (am) { attr = normalizeAttr(am[1]); text = (am[2] || "").trim(); }
            else { attr = "NO_ATTR"; text = plain; }
          }
        }
        if (!text) continue;
        out.push({ attr: attr || "NO_ATTR", speaker: speaker || "", text, kind: speaker ? "speech" : "narration", ...(sourceColor ? { sourceColor } : {}) });
      }

      if (!out.length) {
        const chunks = raw.match(/<p[\s\S]*?<\/p>/gi) || [];
        for (const chunk of chunks) {
          const spanTexts = [];
          const re = /<span[^>]*>([\s\S]*?)<\/span>/gi;
          let m;
          while ((m = re.exec(chunk)) !== null) {
            const decoded = decodeHtmlEntities(m[1]).trim();
            if (decoded) spanTexts.push(decoded);
          }
          const styleMatch = chunk.match(/style\s*=\s*["']([^"']*)["']/i);
          const sourceColor = parseCssColorFromStyle(styleMatch?.[1] || "");
          if (spanTexts.length >= 3) {
            const attr = normalizeAttr(spanTexts[0]);
            const speaker = normalizeSpeaker(spanTexts[1]);
            const text = spanTexts.slice(2).join("\n").trim();
            if (text) out.push({ attr: attr || "NO_ATTR", speaker: speaker || "", text, kind: speaker ? "speech" : "narration", ...(sourceColor ? { sourceColor } : {}) });
          }
        }
      }
      return out;
    }

    function decodeHtmlEntities(input) {
      const el = document.createElement("textarea");
      el.innerHTML = input;
      return el.value;
    }

    function normalizeSpeakerName(input) {
      return String(input || "").normalize("NFKC").replace(/[:・咯\s*$/, "").replace(/\s+/g, " ").trim();
    }

    function parseCssColorFromStyle(styleText) {
      if (!styleText) return "";
      const m = styleText.match(/(?:^|;)\s*color\s*:\s*([^;]+)/i);
      if (!m) return "";
      const candidate = m[1].trim();
      const test = document.createElement("span");
      test.style.color = "";
      test.style.color = candidate;
      return test.style.color ? candidate : "";
    }

    function parseLog(raw) {
      const lines = raw.replace(/\r\n/g, "\n").split("\n");
      const out = [];
      const speechHeader = /^\[([^\]]+)\]\s*(.+?)\s*:\s*(.*)$/;
      const attrOnly = /^\[([^\]]+)\]\s*(.*)$/;
      let current = null;
      const pushCurrent = () => {
        if (!current) return;
        current.text = current.lines.join("\n").trimEnd();
        delete current.lines;
        out.push(current);
        current = null;
      };
      for (const line of lines) {
        const match = line.match(speechHeader);
        if (match) {
          pushCurrent();
          current = { attr: match[1].trim(), speaker: normalizeSpeakerName(match[2]), lines: [match[3] ?? ""], kind: "speech" };
          continue;
        }
        const attrMatch = line.match(attrOnly);
        if (attrMatch) {
          pushCurrent();
          current = { attr: attrMatch[1].trim(), speaker: "", lines: [attrMatch[2] ?? ""], kind: "narration" };
          continue;
        }
        if (current) current.lines.push(line);
        else if (line.trim()) out.push({ attr: "NO_ATTR", speaker: "", text: line, kind: "narration" });
      }
      pushCurrent();
      return out.filter((item) => item.text !== "");
    }

    function buildCharacterMap(list) {
      const map = {};
      const colorCounts = {};
      list.forEach((item) => {
        if (!item.speaker || !item.sourceColor) return;
        colorCounts[item.speaker] ||= {};
        colorCounts[item.speaker][item.sourceColor] = (colorCounts[item.speaker][item.sourceColor] || 0) + 1;
      });
      const names = [...new Set(list.filter((i) => i.speaker).map((i) => i.speaker))];
      names.forEach((name, index) => {
        const bucket = colorCounts[name] || {};
        const picked = Object.keys(bucket).sort((a, b) => bucket[b] - bucket[a])[0];
        map[name] = { color: picked || autoColor(index), icon: defaultAvatar, visible: true };
      });
      return map;
    }

    function autoColor(index) {
      return `hsl(${(index * 67 + 32) % 360} 74% 80%)`;
    }

    function getAttributeCounts() {
      const counts = {};
      entries.forEach((item) => { counts[item.attr] = (counts[item.attr] || 0) + 1; });
      return counts;
    }

    function renderAttributeFilters() {
      const counts = getAttributeCounts();
      attributesBox.innerHTML = "";
      const attrs = Object.keys(counts);
      if (!attrs.length) { attributesBox.textContent = "螻樊ｧ縺ｯ縺ｾ縺縺ゅｊ縺ｾ縺帙ｓ縲・; return; }
      attrs.forEach((attr) => {
        const row = document.createElement("label");
        row.className = "attr-item";
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = activeAttrs.has(attr);
        checkbox.addEventListener("change", () => {
          if (checkbox.checked) activeAttrs.add(attr);
          else activeAttrs.delete(attr);
          applyFiltersAndRender();
        });
        const text = document.createElement("span");
        text.textContent = `${attr === "NO_ATTR" ? "(螻樊ｧ縺ｪ縺・" : attr} (${counts[attr]})`;
        row.append(checkbox, text);
        attributesBox.appendChild(row);
      });
    }

    function renderCharacterSettings() {
      charactersBox.innerHTML = "";
      const names = Object.keys(charMap);
      if (!names.length) { charactersBox.textContent = "繧ｭ繝｣繝ｩ繧ｯ繧ｿ繝ｼ縺瑚ｦ九▽縺九ｊ縺ｾ縺帙ｓ縲・; return; }
      names.forEach((name) => {
        const row = document.createElement("div");
        row.className = "char-row";

        const visible = document.createElement("input");
        visible.type = "checkbox";
        visible.className = "char-toggle";
        visible.title = "陦ｨ遉ｺ/髱櫁｡ｨ遉ｺ";
        visible.checked = charMap[name].visible !== false;
        visible.addEventListener("change", () => { charMap[name].visible = visible.checked; applyFiltersAndRender(); });

        const nameEl = document.createElement("div");
        nameEl.className = "char-name";
        nameEl.textContent = name;

        const color = document.createElement("input");
        color.type = "color";
        color.value = toHex(charMap[name].color);
        color.title = "蜷ｹ縺榊・縺苓牡";
        color.addEventListener("input", () => { charMap[name].color = color.value; renderCurrent(); });

        const thumb = document.createElement("img");
        thumb.className = "icon-thumb";
        thumb.src = charMap[name].icon || defaultAvatar;
        thumb.alt = `${name} icon`;

        const file = document.createElement("input");
        file.type = "file";
        file.accept = "image/*";
        file.title = "繧｢繧､繧ｳ繝ｳ逕ｻ蜒・;
        file.addEventListener("change", async () => {
          const selected = file.files?.[0];
          if (!selected) return;
          charMap[name].icon = await readAsDataUrl(selected);
          thumb.src = charMap[name].icon;
          renderCurrent();
        });

        row.append(visible, nameEl, color, thumb, file);
        charactersBox.appendChild(row);
      });
