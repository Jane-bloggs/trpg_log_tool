<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TRPG Log Comic Viewer Builder</title>
  <style>
    :root {
      --bg-a: #f7f1dc;
      --bg-b: #f9d8b6;
      --panel: #fffaf0;
      --ink: #2f2a22;
      --accent: #d67d53;
      --line: #cdb79f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Meiryo", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 20%, #ffe8c8 0 18%, transparent 19%),
        radial-gradient(circle at 85% 75%, #ffd8be 0 14%, transparent 15%),
        linear-gradient(145deg, var(--bg-a), var(--bg-b));
      min-height: 100vh;
    }
    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 16px;
      padding: 16px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .panel {
      background: color-mix(in srgb, var(--panel) 95%, #fff);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 10px 20px rgba(0,0,0,.06);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 18px;
      letter-spacing: .03em;
    }
    h2 {
      margin: 12px 0 8px;
      font-size: 14px;
    }
    .hint {
      font-size: 12px;
      color: #645848;
      margin: 4px 0;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    button, .file-label {
      border: 1px solid #b79f85;
      background: #fff;
      color: var(--ink);
      border-radius: 10px;
      padding: 7px 10px;
      font-size: 13px;
      cursor: pointer;
    }
    .file-label {
      display: inline-block;
      margin-bottom: 6px;
    }
    #fileName {
      margin-top: 4px;
      word-break: break-all;
    }
    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: #ba6843;
    }
    button:disabled {
      opacity: .5;
      cursor: default;
    }
    .scroll {
      max-height: 180px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      background: #fffcf7;
    }
    .attr-item {
      display: flex;
      gap: 6px;
      align-items: center;
      margin: 4px 0;
      font-size: 13px;
    }
    .char-list {
      max-height: 320px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 6px 8px;
      background: #fffcf7;
    }
    .char-row {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 8px 4px;
      border-bottom: 1px dashed #d9c8b5;
    }
    .char-row:last-child { border-bottom: none; }
    .char-row-top {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .char-row-bottom {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-left: 23px;
    }
    .char-toggle {
      width: 16px;
      height: 16px;
      margin: 0;
      flex-shrink: 0;
    }
    .char-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }
    .icon-thumb {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1px solid #bfa98f;
      object-fit: cover;
      background: #fff;
      flex-shrink: 0;
    }
    .char-icon-label {
      font-size: 11px;
      padding: 2px 8px;
      border: 1px solid #b79f85;
      border-radius: 8px;
      cursor: pointer;
      background: #fff;
      color: var(--ink);
      white-space: nowrap;
      user-select: none;
    }
    .char-icon-label:hover {
      background: #f5ebe0;
    }
    .viewer-wrap {
      position: relative;
      min-height: calc(100vh - 32px);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .viewer-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }
    .column-builder {
      display: none;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #fffdf8;
      gap: 10px;
    }
    .column-builder.active {
      display: grid;
    }
    .column-builder-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-size: 12px;
    }
    .column-pool,
    .column-group-drop {
      min-height: 44px;
      border: 1px dashed #ccb79e;
      border-radius: 10px;
      padding: 8px;
      background: #fffcf7;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: flex-start;
      align-content: flex-start;
    }
    .column-group-drop.is-over,
    .column-pool.is-over {
      background: #f9f1e6;
      border-color: #b98e6e;
    }
    .column-chip,
    .group-attr {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #cdb79f;
      border-radius: 999px;
      background: #fff;
      padding: 5px 10px;
      font-size: 12px;
      cursor: grab;
      user-select: none;
    }
    .group-attr button,
    .column-group-head button {
      border: none;
      background: transparent;
      padding: 0;
      color: #7b5d46;
      cursor: pointer;
      font-size: 12px;
    }
    .column-groups {
      display: grid;
      gap: 8px;
    }
    .column-group-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px;
      background: #fffaf2;
    }
    .column-group-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 700;
    }
    .column-group-empty {
      font-size: 12px;
      color: #7b6a57;
      padding: 4px 2px;
    }
    .stage {
      position: relative;
    }
    .log-flow {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 18px;
    }
    .entry {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      width: 100%;
      animation: rise .14s ease;
    }
    .entry-avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid #f4e3cc;
      object-fit: cover;
      background: #fff;
      flex-shrink: 0;
    }
    .bubble {
      max-width: min(720px, 90%);
      border-radius: 16px;
      border: 2px solid var(--line);
      background: #fff;
      padding: 12px 14px;
      position: relative;
      box-shadow: 0 8px 16px rgba(0,0,0,.08);
    }
    .meta {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 6px;
      font-size: 12px;
    }
    .tag {
      background: #f1e5d7;
      border: 1px solid #ddc9b2;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 11px;
    }
    .name {
      font-weight: 700;
      font-size: 13px;
    }
    .line {
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 18px;
      min-height: 2.5em;
    }
    .entry.narration {
      justify-content: center;
    }
    .entry.narration .entry-avatar {
      display: none;
    }
    .narration {
      margin: 0 auto;
      max-width: 860px;
      text-align: center;
      border-style: dashed;
      background: #fffefb;
    }
    @keyframes rise {
      from { opacity: .4; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .layout.cols-active { grid-template-columns: 1fr; }
    .layout.cols-active aside { display: none; }
    .layout.cols-active.sidebar-open { grid-template-columns: 360px 1fr; }
    .layout.cols-active.sidebar-open aside { display: block; }
    .layout.cols-active:not(.sidebar-open) #columnBuilder { display: none; }
    #fileInput { display: none; }
    .empty {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 16px;
      color: #6d5f4e;
      text-align: center;
      padding: 20px;
    }
    @media (max-width: 960px) {
      .layout { grid-template-columns: 1fr; }
      .viewer-wrap { min-height: 60vh; }
      .stage { height: 58vh; }
      .entry-avatar { width: 74px; height: 74px; }
      .line { font-size: 16px; }
    }
    /* Column split layout */
    .col-layout { display: flex; flex-direction: column; width: 100%; overflow-x: auto; }
    .col-header-row,
    .col-row { display: grid; width: 100%; align-items: start; grid-template-columns: var(--col-def); }
    .col-header-row { position: sticky; top: 0; z-index: 2; }
    .col-header { font-size: 12px; font-weight: 700; text-align: center; padding: 6px 4px; background: #f1e5d7; border-bottom: 1px solid #cdb79f; }
    .col-div-cell { background: var(--line); align-self: stretch; }
    .col-row { position: relative; }
    .col-row::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image: linear-gradient(to right, transparent calc(100% - 3px), var(--line) 0);
      background-size: calc((100% - ((var(--col-count) - 1) * 3px)) / var(--col-count) + 3px) 100%;
      background-repeat: repeat-x;
    }
    .col-entry-slot { padding: 4px; min-width: 0; position: relative; z-index: 1; }
    .col-entry-slot .entry { width: auto; }
    .col-entry-slot .entry-avatar { width: 52px !important; height: 52px !important; }
    .col-entry-slot .bubble { max-width: 100% !important; padding: 8px 10px !important; }
    .col-entry-slot .line { font-size: 13px !important; }
    .col-entry-slot .meta { font-size: 10px !important; }
    .col-entry-slot .name { font-size: 11px !important; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="panel">
      <h1>TRPGログ整形ツール</h1>
      <label class="file-label" for="fileInput">ログファイルを選択</label>
      <input id="fileInput" type="file" accept=".txt,.log,.html,.htm">
      <div id="fileName" class="hint">未選択</div>
      <div id="loadStatus" class="hint"></div>
      <div class="toolbar">
        <button id="exportBtn" class="primary" disabled>HTMLを出力</button>
        <button id="exportStaticBtn" disabled>閲覧専用HTMLを出力</button>
        <button id="epubBtn" disabled>EPUBを出力</button>
      </div>

      <h2>タブ表示切替</h2>
      <div class="toolbar">
        <button id="allOnBtn" disabled>全選択</button>
        <button id="allOffBtn" disabled>全解除</button>
      </div>
      <div id="attributesBox" class="scroll"></div>

      <h2>列分け表示</h2>
      <div class="toolbar" style="flex-direction:column;gap:4px">
        <label class="attr-item"><input type="radio" name="viewMode" value="normal" checked> 通常表示</label>
        <label class="attr-item"><input type="radio" name="viewMode" value="columns"> タブごとに列を分ける</label>
      </div>
      <div id="columnAssignBox" class="scroll" style="display:none;margin-top:4px"></div>

      <h2>キャラクター設定</h2>
      <div class="hint">色とアイコンは出力HTMLにも埋め込まれます。</div>
      <div id="charactersBox" class="char-list"></div>
    </aside>

    <main class="panel viewer-wrap">
      <div class="viewer-head">
        <div id="progress" class="hint">0 件</div>
        <button id="sidebarToggleBtn" style="display:none" title="設定パネルを表示">⚙ 設定</button>
      </div>
      <section id="columnBuilder" class="column-builder" hidden>
        <div class="column-builder-head">
          <div class="hint">タブを下の列へドラッグして割り当てます。</div>
          <button id="addColumnBtn" type="button">＋ 列を追加</button>
        </div>
        <div>
          <div class="hint">未割り当てタブ</div>
          <div id="columnPool" class="column-pool"></div>
        </div>
        <div id="columnGroups" class="column-groups"></div>
      </section>
      <section id="stage" class="stage" tabindex="0">
        <div id="emptyState" class="empty" hidden>左の「ログファイルを選択」から読み込んでください。</div>
        <div id="logFlow" class="log-flow" hidden></div>
      </section>
    </main>
  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const fileName = document.getElementById("fileName");
    const loadStatus = document.getElementById("loadStatus");
    const attributesBox = document.getElementById("attributesBox");
    const charactersBox = document.getElementById("charactersBox");
    const exportBtn = document.getElementById("exportBtn");
    const exportStaticBtn = document.getElementById("exportStaticBtn");
    const epubBtn = document.getElementById("epubBtn");
    const allOnBtn = document.getElementById("allOnBtn");
    const allOffBtn = document.getElementById("allOffBtn");
    const stage = document.getElementById("stage");
    const emptyState = document.getElementById("emptyState");
    const logFlow = document.getElementById("logFlow");
    const progress = document.getElementById("progress");
    const sidebarToggleBtn = document.getElementById("sidebarToggleBtn");
    const layout = document.querySelector(".layout");
    const columnBuilder = document.getElementById("columnBuilder");
    const columnPool = document.getElementById("columnPool");
    const columnGroupsEl = document.getElementById("columnGroups");
    const addColumnBtn = document.getElementById("addColumnBtn");

    // sentinel for incremental rendering
    const renderSentinel = document.createElement("div");
    renderSentinel.style.cssText = "height:1px;visibility:hidden";
    renderSentinel.hidden = true;
    logFlow.appendChild(renderSentinel);
    const sentinelObserver = new IntersectionObserver((obs) => {
      if (obs[0].isIntersecting) renderNextChunk();
    }, { rootMargin: "400px" });
    sentinelObserver.observe(renderSentinel);

    const defaultAvatar =
      "data:image/svg+xml;base64," +
      btoa(unescape(encodeURIComponent(
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">' +
        '<rect width="64" height="64" fill="#ede3d8"/>' +
        '<circle cx="32" cy="21" r="12" fill="#c4a07e"/>' +
        '<path d="M32,33 C18,33 8,43 8,58 L8,64 L56,64 L56,58 C56,43 46,33 32,33 Z" fill="#c4a07e"/>' +
        "</svg>"
      )));

    function coloredAvatar(color) {
      const bg = color || "#ede3d8";
      const fg = shadeColor(bg, -50);
      const svg =
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">' +
        '<rect width="64" height="64" fill="' + bg + '"/>' +
        '<circle cx="32" cy="21" r="12" fill="' + fg + '"/>' +
        '<path d="M32,33 C18,33 8,43 8,58 L8,64 L56,64 L56,58 C56,43 46,33 32,33 Z" fill="' + fg + '"/>' +
        "</svg>";
      return "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svg)));
    }

    let entries = [];
    let filteredEntries = [];
    let activeAttrs = new Set();
    let charMap = {};
    let columnSplitMode = false;
    let columnGroups = [];
    let nextColumnGroupId = 1;
    let entryRenderCacheVersion = 0;
    let entryHtmlTemplateCache = new Map();
    let renderRequestId = 0;
    let busyStateCount = 0;
    let baseLoadStatusText = "";
    let renderOffset = 0;
    const RENDER_CHUNK_SIZE = 60;
    let colLayoutEl = null;
    let colChunkVisible = [];
    let colChunkGroups = [];
    let colChunkOffset = 0;
    renderCurrent(); // 初期状態: "ログファイルを選択" メッセージを表示

    fileInput.addEventListener("change", async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      try {
        setBusyState(true, "読み込み中...");
        await nextFrame();
        const text = await readTextWithEncoding(file);
        fileName.textContent = file.name;
        await bootFromLog(text, file.name);
      } catch (error) {
        setBaseLoadStatus(`読込エラー: ${error?.message || error}`);
        setBusyState(false);
      }
    });

    allOnBtn.addEventListener("click", () => {
      const keys = Object.keys(getAttributeCounts());
      activeAttrs = new Set(keys);
      renderAttributeFilters();
      applyFiltersAndRender();
    });

    allOffBtn.addEventListener("click", () => {
      activeAttrs = new Set();
      renderAttributeFilters();
      applyFiltersAndRender();
    });

    document.querySelectorAll('input[name="viewMode"]').forEach(r => {
      r.addEventListener('change', () => {
        columnSplitMode = r.value === 'columns';
        layout.classList.toggle('cols-active', columnSplitMode);
        layout.classList.toggle('sidebar-open', columnSplitMode);
        sidebarToggleBtn.style.display = columnSplitMode ? '' : 'none';
        sidebarToggleBtn.textContent = columnSplitMode ? '✕ 設定を隠す' : '⚙ 設定';
        syncColumnBuilderVisibility();
        if (columnSplitMode) activeAttrs = new Set();
        ensureColumnAttrsVisible();
        renderAttributeFilters();
        applyFiltersAndRender();
      });
    });

    sidebarToggleBtn.addEventListener('click', () => {
      const isOpen = layout.classList.toggle('sidebar-open');
      sidebarToggleBtn.textContent = isOpen ? '✕ 設定を隠す' : '⚙ 設定';
      if (columnSplitMode) columnBuilder.hidden = !isOpen;
    });

    addColumnBtn.addEventListener("click", () => {
      columnGroups.push(makeColumnGroup());
      renderColumnBuilder();
      renderCurrent();
    });

    exportBtn.addEventListener("click", () => {
      if (!entries.length) return;
      const payload = {
        entries: entries.map(({ _cacheId, ...item }) => item),
        charMap,
        activeAttrs: Array.from(activeAttrs),
        columnGroups,
        columnSplitMode,
      };
      const html = buildExportHtml(payload);
      const blob = new Blob([html], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "trpg-comic-viewer.html";
      a.click();
      URL.revokeObjectURL(url);
    });

    exportStaticBtn.addEventListener("click", () => {
      if (!entries.length) return;
      const visible = filteredEntries.length ? filteredEntries : entries;
      const html = buildStaticExportHtml(visible, charMap, columnSplitMode, columnGroups);
      const blob = new Blob([html], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "trpg-comic-static.html";
      a.click();
      URL.revokeObjectURL(url);
    });

    epubBtn.addEventListener("click", async () => {
      if (!entries.length) return;
      epubBtn.disabled = true;
      try {
        const bytes = await buildEpub({
          title: deriveBaseName(fileName.textContent || "trpg-log"),
          entries: filteredEntries.length ? filteredEntries : entries,
          charMap,
          activeAttrs: Array.from(activeAttrs),
        });
        const blob = new Blob([bytes], { type: "application/epub+zip" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        const base = deriveBaseName(fileName.textContent || "trpg-log");
        a.href = url;
        a.download = `${base}.epub`;
        a.click();
        URL.revokeObjectURL(url);
      } catch (error) {
        setBaseLoadStatus(`EPUB出力エラー: ${error?.message || error}`);
      } finally {
        epubBtn.disabled = entries.length === 0;
      }
    });

    async function bootFromLog(text, fileName = "") {
      emptyState.hidden = true;
      entries = parseAnyLog(text, fileName).map((item, index) => ({
        ...item,
        _cacheId: index,
      }));
      charMap = buildCharacterMap(entries);
      const attrs = Object.keys(getAttributeCounts());
      activeAttrs = new Set(attrs);
      columnGroups = buildInitialColumnGroups(attrs);
      resetEntryRenderCache();
      renderAttributeFilters();
      renderColumnBuilder();
      syncColumnBuilderVisibility();
      renderCharacterSettings();
      setBusyState(true, "キャッシュ準備中...");
      await nextFrame();
      await warmEntryHtmlCache();
      applyFiltersAndRender();
      exportBtn.disabled = entries.length === 0;
      exportStaticBtn.disabled = entries.length === 0;
      epubBtn.disabled = entries.length === 0;
      allOnBtn.disabled = attrs.length === 0;
      allOffBtn.disabled = attrs.length === 0;
      const chars = Object.keys(charMap).length;
      setBaseLoadStatus(`読み込み: ${entries.length}件 / 属性:${attrs.length} / キャラ:${chars}`);
      setBusyState(false);
    }

    async function readTextWithEncoding(file) {
      const bytes = await file.arrayBuffer();
      const utf8 = new TextDecoder("utf-8", { fatal: false }).decode(bytes);
      // Shift_JIS exports are common in TRPG tools.
      if (looksMojibake(utf8)) {
        try {
          const sjis = new TextDecoder("shift_jis", { fatal: false }).decode(bytes);
          if (!looksMojibake(sjis)) return sjis;
        } catch (_) {
          // Ignore and keep UTF-8 fallback.
        }
      }
      return utf8;
    }

    function looksMojibake(text) {
      if (!text) return false;
      const replacement = (text.match(/\uFFFD/g) || []).length;
      return replacement >= 2;
    }

    function parseAnyLog(raw, fileName = "") {
      const isHtmlFile = /\.(html?|xhtml)$/i.test(fileName);
      const looksHtml = /<html[\s>]|<body[\s>]|<p[\s>]|<\/p>/i.test(raw);
      if (isHtmlFile || looksHtml) {
        const htmlEntries = parseHtmlLog(raw);
        if (htmlEntries.length) return htmlEntries;
        const stripped = raw
          .replace(/<br\s*\/?>/gi, "\n")
          .replace(/<\/p>/gi, "\n")
          .replace(/<[^>]+>/g, "");
        const textFallback = parseLog(stripped);
        if (textFallback.length) return textFallback;
      }
      return parseLog(raw);
    }

    function parseHtmlLog(raw) {
      const doc = new DOMParser().parseFromString(raw, "text/html");
      const pNodes = Array.from(doc.querySelectorAll("p"));
      const out = [];

      const normalizeAttr = (s) => {
        const cleaned = (s || "").replace(/[\[\]]/g, "").trim();
        return cleaned || "NO_ATTR";
      };
      const normalizeSpeaker = (s) => normalizeSpeakerName(s);

      for (const p of pNodes) {
        const sourceColor = parseCssColorFromStyle(p.getAttribute("style") || "");
        const spans = Array.from(p.querySelectorAll("span"))
          .map((span) => span.textContent?.trim() || "")
          .filter(Boolean);

        let attr = "";
        let speaker = "";
        let text = "";

        if (spans.length >= 3) {
          attr = normalizeAttr(spans[0]);
          speaker = normalizeSpeaker(spans[1]);
          text = spans.slice(2).join("\n").trim();
        } else {
          const plain = (p.textContent || "").trim().replace(/\s+/g, " ");
          const m = plain.match(/^\[([^\]]+)\]\s*(.+?)\s*[:：]\s*(.*)$/);
          if (m) {
            attr = normalizeAttr(m[1]);
            speaker = normalizeSpeaker(m[2]);
            text = (m[3] || "").trim();
          } else if (plain) {
            const attrOnly = plain.match(/^\[([^\]]+)\]\s*(.*)$/);
            if (attrOnly) {
              attr = normalizeAttr(attrOnly[1]);
              text = (attrOnly[2] || "").trim();
            } else {
              attr = "NO_ATTR";
              text = plain;
            }
          }
        }

        if (!text) continue;
        out.push({
          attr: attr || "NO_ATTR",
          speaker: speaker || "",
          text,
          kind: speaker ? "speech" : "narration",
          ...(sourceColor ? { sourceColor } : {}),
        });
      }

      if (!out.length) {
        // Fallback for malformed HTML exports.
        const chunks = raw.match(/<p[\s\S]*?<\/p>/gi) || [];
        for (const chunk of chunks) {
          const spanTexts = [];
          const re = /<span[^>]*>([\s\S]*?)<\/span>/gi;
          let m;
          while ((m = re.exec(chunk)) !== null) {
            const decoded = decodeHtmlEntities(m[1]).trim();
            if (decoded) spanTexts.push(decoded);
          }
          const styleMatch = chunk.match(/style\s*=\s*["']([^"']*)["']/i);
          const sourceColor = parseCssColorFromStyle(styleMatch?.[1] || "");
          if (spanTexts.length >= 3) {
            const attr = normalizeAttr(spanTexts[0]);
            const speaker = normalizeSpeaker(spanTexts[1]);
            const text = spanTexts.slice(2).join("\n").trim();
            if (text) {
              out.push({
                attr: attr || "NO_ATTR",
                speaker: speaker || "",
                text,
                kind: speaker ? "speech" : "narration",
                ...(sourceColor ? { sourceColor } : {}),
              });
            }
          }
        }
      }

      return out;
    }

    function decodeHtmlEntities(input) {
      const el = document.createElement("textarea");
      el.innerHTML = input;
      return el.value;
    }

    function normalizeSpeakerName(input) {
      const base = String(input || "");
      return base
        .normalize("NFKC")
        .replace(/[:：]\s*$/, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function parseCssColorFromStyle(styleText) {
      if (!styleText) return "";
      const m = styleText.match(/(?:^|;)\s*color\s*:\s*([^;]+)/i);
      if (!m) return "";
      const candidate = m[1].trim();
      const test = document.createElement("span");
      test.style.color = "";
      test.style.color = candidate;
      return test.style.color ? candidate : "";
    }

    function parseLog(raw) {
      const lines = raw.replace(/\r\n/g, "\n").split("\n");
      const out = [];
      const speechHeader = /^\[([^\]]+)\]\s*(.+?)\s*:\s*(.*)$/;
      const attrOnly = /^\[([^\]]+)\]\s*(.*)$/;
      let current = null;

      const pushCurrent = () => {
        if (!current) return;
        current.text = current.lines.join("\n").trimEnd();
        delete current.lines;
        out.push(current);
        current = null;
      };

      for (const line of lines) {
        const match = line.match(speechHeader);
        if (match) {
          pushCurrent();
          current = {
            attr: match[1].trim(),
            speaker: normalizeSpeakerName(match[2]),
            lines: [match[3] ?? ""],
            kind: "speech",
          };
          continue;
        }
        const attrMatch = line.match(attrOnly);
        if (attrMatch) {
          pushCurrent();
          current = {
            attr: attrMatch[1].trim(),
            speaker: "",
            lines: [attrMatch[2] ?? ""],
            kind: "narration",
          };
          continue;
        }
        if (current) {
          current.lines.push(line);
        } else if (line.trim() !== "") {
          out.push({
            attr: "NO_ATTR",
            speaker: "",
            text: line,
            kind: "narration",
          });
        }
      }
      pushCurrent();

      return out.filter((item) => item.text !== "");
    }

    function buildCharacterMap(list) {
      const map = {};
      const colorCountsBySpeaker = {};

      list.forEach((item) => {
        if (!item.speaker || !item.sourceColor) return;
        colorCountsBySpeaker[item.speaker] ||= {};
        colorCountsBySpeaker[item.speaker][item.sourceColor] =
          (colorCountsBySpeaker[item.speaker][item.sourceColor] || 0) + 1;
      });

      const names = [...new Set(
        list
          .filter((item) => item.speaker)
          .map((item) => item.speaker)
      )];
      names.forEach((name, index) => {
        const bucket = colorCountsBySpeaker[name] || {};
        const picked = Object.keys(bucket).sort((a, b) => bucket[b] - bucket[a])[0];
        map[name] = {
          color: picked || autoColor(index),
          icon: null,
          visible: true,
        };
      });
      return map;
    }

    function autoColor(index) {
      const hue = (index * 67 + 32) % 360;
      return `hsl(${hue} 74% 80%)`;
    }

    function getAttributeCounts() {
      const counts = {};
      entries.forEach((item) => {
        counts[item.attr] = (counts[item.attr] || 0) + 1;
      });
      return counts;
    }

    function renderAttributeFilters() {
      const counts = getAttributeCounts();
      attributesBox.innerHTML = "";
      const attrs = Object.keys(counts);
      if (!attrs.length) {
        attributesBox.textContent = "属性はまだありません。";
        return;
      }
      attrs.forEach((attr) => {
        const row = document.createElement("label");
        row.className = "attr-item";
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = activeAttrs.has(attr);
        checkbox.addEventListener("change", () => {
          if (checkbox.checked) activeAttrs.add(attr);
          else activeAttrs.delete(attr);
          applyFiltersAndRender();
        });
        const text = document.createElement("span");
        const attrText = attr === "NO_ATTR" ? "(属性なし)" : attr;
        text.textContent = `${attrText} (${counts[attr]})`;
        row.append(checkbox, text);
        attributesBox.appendChild(row);
      });
    }

    function renderCharacterSettings() {
      charactersBox.innerHTML = "";
      const names = Object.keys(charMap);
      if (!names.length) {
        charactersBox.textContent = "キャラクターが見つかりません。";
        return;
      }
      names.forEach((name) => {
        const row = document.createElement("div");
        row.className = "char-row";

        const visible = document.createElement("input");
        visible.type = "checkbox";
        visible.className = "char-toggle";
        visible.title = "表示/非表示";
        visible.checked = charMap[name].visible !== false;
        visible.addEventListener("change", () => {
          charMap[name].visible = visible.checked;
          applyFiltersAndRender();
        });

        const nameEl = document.createElement("div");
        nameEl.className = "char-name";
        nameEl.textContent = name;
        nameEl.title = name;

        const color = document.createElement("input");
        color.type = "color";
        color.value = toHex(charMap[name].color);
        color.title = "吹き出し色";
        color.style.width = "28px";
        color.style.height = "26px";
        color.style.padding = "0";
        color.style.border = "1px solid #bfa98f";
        color.style.borderRadius = "6px";
        color.style.cursor = "pointer";
        color.addEventListener("input", () => {
          charMap[name].color = color.value;
          resetEntryRenderCache();
          renderCurrent();
        });

        const thumb = document.createElement("img");
        thumb.className = "icon-thumb";
        thumb.src = charMap[name].icon || coloredAvatar(charMap[name].color);
        thumb.alt = `${name} icon`;

        const file = document.createElement("input");
        file.type = "file";
        file.accept = "image/*";
        file.style.display = "none";
        file.addEventListener("change", async () => {
          const selected = file.files?.[0];
          if (!selected) return;
          charMap[name].icon = await readAsDataUrl(selected);
          thumb.src = charMap[name].icon;
          resetEntryRenderCache();
          renderCurrent();
        });

        const fileLabel = document.createElement("label");
        fileLabel.className = "char-icon-label";
        fileLabel.textContent = "アイコン変更";
        fileLabel.appendChild(file);

        const topRow = document.createElement("div");
        topRow.className = "char-row-top";
        topRow.append(visible, nameEl);

        const bottomRow = document.createElement("div");
        bottomRow.className = "char-row-bottom";
        bottomRow.append(color, thumb, fileLabel);

        row.append(topRow, bottomRow);
        charactersBox.appendChild(row);
      });
    }

    function makeColumnGroup(attrs = []) {
      return {
        id: `column-${nextColumnGroupId++}`,
        attrs: [...new Set(attrs)],
      };
    }

    function buildInitialColumnGroups(attrs) {
      if (attrs.includes("メイン")) return [makeColumnGroup(["メイン"])];
      return [];
    }

    function getAssignedAttrs() {
      return new Set(columnGroups.flatMap((group) => group.attrs));
    }

    function getUnassignedAttrs() {
      const assigned = getAssignedAttrs();
      return Object.keys(getAttributeCounts()).filter((attr) => !assigned.has(attr));
    }

    function getColumnGroupsForRender() {
      return columnGroups.filter((group) => group.attrs.length > 0);
    }

    function getColumnGroupLabel(group, index) {
      if (!group.attrs.length) return `列${index + 1}`;
      return group.attrs.map((attr) => attr === "NO_ATTR" ? "(属性なし)" : attr).join(" / ");
    }

    function syncColumnBuilderVisibility() {
      columnBuilder.hidden = !columnSplitMode;
      columnBuilder.classList.toggle("active", columnSplitMode);
    }

    function assignAttrToColumnGroup(attr, groupId) {
      columnGroups = columnGroups.map((group) => ({
        ...group,
        attrs: group.attrs.filter((item) => item !== attr),
      }));
      if (groupId) {
        const group = columnGroups.find((item) => item.id === groupId);
        if (group && !group.attrs.includes(attr)) group.attrs.push(attr);
      }
      ensureColumnAttrsVisible();
      renderColumnBuilder();
      renderAttributeFilters();
      applyFiltersAndRender();
    }

    function removeColumnGroup(groupId) {
      columnGroups = columnGroups.filter((group) => group.id !== groupId);
      renderColumnBuilder();
      applyFiltersAndRender();
    }

    function setupAttrDropTarget(target, groupId) {
      target.addEventListener("dragover", (event) => {
        event.preventDefault();
        target.classList.add("is-over");
      });
      target.addEventListener("dragleave", () => {
        target.classList.remove("is-over");
      });
      target.addEventListener("drop", (event) => {
        event.preventDefault();
        target.classList.remove("is-over");
        const attr = event.dataTransfer?.getData("text/plain");
        if (!attr) return;
        assignAttrToColumnGroup(attr, groupId);
      });
    }

    function renderColumnBuilder() {
      if (!columnPool || !columnGroupsEl) return;
      const poolFragment = document.createDocumentFragment();
      const groupsFragment = document.createDocumentFragment();

      const unassigned = getUnassignedAttrs();
      if (!unassigned.length) {
        const note = document.createElement("div");
        note.className = "hint";
        note.textContent = "未割り当てのタブはありません。";
        poolFragment.appendChild(note);
      } else {
        unassigned.forEach((attr) => {
          const chip = document.createElement("div");
          chip.className = "column-chip";
          chip.draggable = true;
          chip.textContent = attr === "NO_ATTR" ? "(属性なし)" : attr;
          chip.addEventListener("dragstart", (event) => {
            event.dataTransfer?.setData("text/plain", attr);
          });
          poolFragment.appendChild(chip);
        });
      }
      setupAttrDropTarget(columnPool, null);

      if (!columnGroups.length) {
        const note = document.createElement("div");
        note.className = "hint";
        note.textContent = "列を追加して、未割り当てタブをドラッグしてください。";
        groupsFragment.appendChild(note);
        columnPool.replaceChildren(poolFragment);
        columnGroupsEl.replaceChildren(groupsFragment);
        return;
      }

      columnGroups.forEach((group, index) => {
        const card = document.createElement("section");
        card.className = "column-group-card";

        const head = document.createElement("div");
        head.className = "column-group-head";
        const title = document.createElement("div");
        title.textContent = getColumnGroupLabel(group, index);
        const removeBtn = document.createElement("button");
        removeBtn.type = "button";
        removeBtn.textContent = "列を削除";
        removeBtn.addEventListener("click", () => removeColumnGroup(group.id));
        head.append(title, removeBtn);

        const drop = document.createElement("div");
        drop.className = "column-group-drop";
        setupAttrDropTarget(drop, group.id);

        if (!group.attrs.length) {
          const empty = document.createElement("div");
          empty.className = "column-group-empty";
          empty.textContent = "ここへタブをドロップ";
          drop.appendChild(empty);
        } else {
          group.attrs.forEach((attr) => {
            const pill = document.createElement("div");
            pill.className = "group-attr";
            pill.draggable = true;
            pill.addEventListener("dragstart", (event) => {
              event.dataTransfer?.setData("text/plain", attr);
            });
            const text = document.createElement("span");
            text.textContent = attr === "NO_ATTR" ? "(属性なし)" : attr;
            const remove = document.createElement("button");
            remove.type = "button";
            remove.textContent = "×";
            remove.addEventListener("click", () => assignAttrToColumnGroup(attr, null));
            pill.append(text, remove);
            drop.appendChild(pill);
          });
        }

        card.append(head, drop);
        groupsFragment.appendChild(card);
      });
      columnPool.replaceChildren(poolFragment);
      columnGroupsEl.replaceChildren(groupsFragment);
    }

    function findColumnGroupIndex(attr, groups) {
      return groups.findIndex((group) => group.attrs.includes(attr));
    }

    function renderColumnsIntoFlow(visible, container) {
      const groups = getColumnGroupsForRender();
      const N = groups.length;
      if (N === 0) {
        renderOffset = 0;
        renderSentinel.hidden = false;
        renderNextChunk();
        return;
      }
      const colDef = ['minmax(260px,1fr)'];
      for (let i = 1; i < N; i++) colDef.push('3px', 'minmax(260px,1fr)');
      colLayoutEl = document.createElement('div');
      colLayoutEl.className = 'col-layout';
      colLayoutEl.style.setProperty('--col-def', colDef.join(' '));
      colLayoutEl.style.setProperty('--col-count', String(N));
      let headerHtml = `<div class="col-header-row">`;
      groups.forEach((group, index) => {
        if (index > 0) headerHtml += `<div class="col-div-cell"></div>`;
        headerHtml += `<div class="col-header">${esc(getColumnGroupLabel(group, index))}</div>`;
      });
      headerHtml += `</div>`;
      colLayoutEl.innerHTML = headerHtml;
      container.insertBefore(colLayoutEl, renderSentinel);
      colChunkVisible = visible;
      colChunkGroups = groups;
      colChunkOffset = 0;
      renderSentinel.hidden = false;
      renderNextColChunk();
    }

    function renderNextColChunk() {
      if (!colLayoutEl) return;
      const chunk = colChunkVisible.slice(colChunkOffset, colChunkOffset + RENDER_CHUNK_SIZE);
      if (!chunk.length) {
        renderSentinel.hidden = true;
        return;
      }
      let html = '';
      chunk.forEach(item => {
        const si = findColumnGroupIndex(item.attr, colChunkGroups);
        if (si < 0) return;
        html += `<div class="col-row"><div class="col-entry-slot" style="grid-column:${1 + si * 2}">${getCachedEntryHtml(item)}</div></div>`;
      });
      colLayoutEl.insertAdjacentHTML('beforeend', html);
      colChunkOffset += chunk.length;
      if (colChunkOffset >= colChunkVisible.length) renderSentinel.hidden = true;
    }

    function toHex(color) {
      if (color.startsWith("#")) return color;
      const temp = document.createElement("div");
      temp.style.color = color;
      document.body.appendChild(temp);
      const rgb = getComputedStyle(temp).color;
      temp.remove();
      const nums = rgb.match(/\d+/g)?.map(Number) || [255, 255, 255];
      return "#" + nums.slice(0, 3).map((n) => n.toString(16).padStart(2, "0")).join("");
    }

    function readAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
      });
    }

    function nextFrame() {
      return new Promise((resolve) => requestAnimationFrame(() => resolve()));
    }

    function setBaseLoadStatus(text) {
      baseLoadStatusText = text;
      if (busyStateCount === 0) loadStatus.textContent = text;
    }

    function setBusyState(isBusy, progressText = "Loading...") {
      if (isBusy) {
        busyStateCount += 1;
        progress.textContent = progressText;
        loadStatus.textContent = progressText;
        return;
      }
      busyStateCount = Math.max(0, busyStateCount - 1);
      if (busyStateCount === 0) loadStatus.textContent = baseLoadStatusText;
    }

    function applyFiltersAndRender() {
      const requestId = ++renderRequestId;
      setBusyState(true, entries.length ? "表示更新中..." : "Loading...");
      requestAnimationFrame(() => {
        if (requestId !== renderRequestId) {
          setBusyState(false);
          return;
        }
        const assignedAttrs = getAssignedAttrs();
        filteredEntries = entries.filter((item) => {
          if (columnSplitMode && assignedAttrs.size > 0 && !assignedAttrs.has(item.attr)) return false;
          if (!activeAttrs.has(item.attr)) return false;
          return isSpeakerVisible(item);
        });
        renderCurrent();
        setBusyState(false);
      });
    }

    function ensureColumnAttrsVisible() {
      if (!columnSplitMode) return;
      activeAttrs = new Set(getAssignedAttrs());
    }

    function resetEntryRenderCache() {
      entryRenderCacheVersion += 1;
      entryHtmlTemplateCache = new Map();
    }

    function getEntryCacheKey(item) {
      return `${entryRenderCacheVersion}:${item._cacheId ?? `${item.attr}:${item.speaker}:${item.text}`}`;
    }

    async function warmEntryHtmlCache() {
      for (let i = 0; i < entries.length; i++) {
        getCachedEntryHtml(entries[i]);
        if (i > 0 && i % 200 === 0) {
          loadStatus.textContent = `キャッシュ準備中... ${i}/${entries.length}`;
          await nextFrame();
        }
      }
    }

    function getCachedEntryHtml(item) {
      const cacheKey = getEntryCacheKey(item);
      const cached = entryHtmlTemplateCache.get(cacheKey);
      if (cached) return cached;
      const html = createEntryHtml(item);
      entryHtmlTemplateCache.set(cacheKey, html);
      return html;
    }

    function isSpeakerVisible(item) {
      if (!item.speaker) return true;
      const cfg = charMap[item.speaker];
      if (!cfg) return true;
      return cfg.visible !== false;
    }

    function clearLogFlowContent() {
      colLayoutEl = null;
      colChunkVisible = [];
      colChunkGroups = [];
      colChunkOffset = 0;
      let child = logFlow.firstChild;
      while (child) {
        const next = child.nextSibling;
        if (child !== renderSentinel) logFlow.removeChild(child);
        child = next;
      }
    }

    function renderCurrent() {
      const total = filteredEntries.length;
      progress.textContent = total ? `${total} 件` : `0 件`;

      if (!total) {
        logFlow.hidden = true;
        clearLogFlowContent();
        renderSentinel.hidden = true;
        emptyState.hidden = false;
        emptyState.textContent = entries.length
          ? "表示対象がありません。タブ表示切替を確認してください。"
          : "左の「ログファイルを選択」から読み込んでください。";
        return;
      }

      logFlow.hidden = false;
      emptyState.hidden = true;
      clearLogFlowContent();

      if (columnSplitMode && getColumnGroupsForRender().length > 0) {
        renderColumnsIntoFlow(filteredEntries, logFlow);
      } else {
        renderOffset = 0;
        renderSentinel.hidden = false;
        renderNextChunk();
      }
    }

    function renderNextChunk() {
      if (columnSplitMode) { if (colLayoutEl) renderNextColChunk(); return; }
      const chunk = filteredEntries.slice(renderOffset, renderOffset + RENDER_CHUNK_SIZE);
      if (!chunk.length) {
        renderSentinel.hidden = true;
        return;
      }
      const html = chunk.map((item) => getCachedEntryHtml(item)).join("");
      renderSentinel.insertAdjacentHTML("beforebegin", html);
      renderOffset += chunk.length;
      if (renderOffset >= filteredEntries.length) {
        renderSentinel.hidden = true;
      }
    }

    function createEntryHtml(item) {
      const attrText = item.attr === "NO_ATTR" ? "(属性なし)" : esc(item.attr);
      const textHtml = esc(item.text || "").replace(/\n/g, "<br>");
      if (item.kind === "narration" || !item.speaker) {
        return `<div class="entry narration"><img class="entry-avatar" alt="" src="${defaultAvatar}"><article class="bubble narration" style="background:#fffefb;border-color:#d8c8b4;color:#4f4437"><div class="meta"><span class="tag">${attrText}</span><span class="name">地の文</span></div><div class="line">${textHtml}</div></article></div>`;
      }
      const cfg = charMap[item.speaker] || { color: "#fff", icon: null };
      const avatarSrc = cfg.icon || coloredAvatar(cfg.color);
      const bubbleBg = cfg.color || "#fff";
      const border = shadeColor(cfg.color || "#ffffff", -30);
      return `<div class="entry"><img class="entry-avatar" alt="" src="${avatarSrc}"><article class="bubble" style="background:${esc(bubbleBg)};border-color:${esc(border)};color:#231f1b"><div class="meta"><span class="tag">${attrText}</span><span class="name">${esc(item.speaker)}</span></div><div class="line">${textHtml}</div></article></div>`;
    }
    function shadeColor(color, offset) {
      const hex = toHex(color);
      const num = parseInt(hex.slice(1), 16);
      const r = Math.max(0, Math.min(255, ((num >> 16) & 255) + offset));
      const g = Math.max(0, Math.min(255, ((num >> 8) & 255) + offset));
      const b = Math.max(0, Math.min(255, (num & 255) + offset));
      return "#" + [r, g, b].map((n) => n.toString(16).padStart(2, "0")).join("");
    }

    function buildExportHtml(payload) {
      const data = JSON.stringify(payload).replace(/</g, "\\u003c");
      return `<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TRPG Comic Viewer</title>

    .head{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:10px}
    .flow{display:flex;flex-direction:column;gap:10px}
    .entry{display:flex;gap:10px;align-items:flex-end}
    .entry-avatar{width:76px;height:76px;border-radius:50%;border:3px solid #f4e3cc;object-fit:cover;background:#fff;flex-shrink:0}
    .bubble{max-width:min(760px,92%);border-radius:16px;border:2px solid #cdb79f;background:#fff;padding:12px 14px}
    .meta{display:flex;gap:8px;align-items:center;margin-bottom:6px;font-size:12px}
    .tag{background:#f1e5d7;border:1px solid #ddc9b2;border-radius:999px;padding:2px 8px;font-size:11px}
    .line{white-space:pre-wrap;line-height:1.6;font-size:17px}
    .entry.narration{justify-content:center}
    .entry.narration .entry-avatar{display:none}
    .entry.narration .bubble{margin:0 auto;max-width:900px;text-align:center;border-style:dashed;background:#fffefb;border-color:#d8c8b4;color:#4f4437}
    @media (max-width:920px){.root{grid-template-columns:1fr}.line{font-size:16px}.entry-avatar{width:66px;height:66px}}
    .col-layout{display:grid;width:100%;align-items:start;overflow-x:auto}.col-header{font-size:12px;font-weight:700;text-align:center;padding:6px 4px;background:#f1e5d7;border-bottom:1px solid #cdb79f;position:sticky;top:0;z-index:2}.col-div-cell{background:#cdb79f;align-self:stretch}.col-cell{padding:4px;min-width:0}.col-cell .entry-avatar{width:52px!important;height:52px!important}.col-cell .bubble{max-width:100%!important;padding:8px 10px!important}.col-cell .line{font-size:13px!important}.col-cell .meta{font-size:10px!important}.col-cell .name{font-size:11px!important}.col-cell.col-empty{padding:0}.col-cell.col-ghost .entry{visibility:hidden;pointer-events:none}
  </style>
</head>
<body>
  <div class="root">
    <aside class="panel">
      <div class="title">タブ表示切替</div>
      <div class="toolbar"><button id="attrOn">全選択</button><button id="attrOff">全解除</button></div>
      <div id="attrs" class="box"></div>
      <div class="title" style="margin-top:12px">列分け表示</div>
      <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:6px"><label class="row"><input type="radio" name="vm" value="n"> 通常</label><label class="row"><input type="radio" name="vm" value="c"> 列を分ける</label></div><div id="colAssign" class="box" style="display:none"></div>
      <div class="title" style="margin-top:12px">キャラ設定</div>
      <div id="chars" class="box"></div>
    </aside>
    <main class="panel">
      <div class="head"><div style="font-weight:700">対話ログ</div><div id="progress">0件</div></div>
      <section id="flow" class="flow"></section>
    </main>
  </div>
  <script>
    const payload = ${data};
    const defaultAvatar = "${defaultAvatar}";
    const entries = payload.entries || [];
    const charMap = JSON.parse(JSON.stringify(payload.charMap || {}));
    const flow = document.getElementById("flow");
    const progress = document.getElementById("progress");
    const attrsBox = document.getElementById("attrs");
    const charsBox = document.getElementById("chars");
    let activeAttrs = new Set(payload.activeAttrs || []);
    let colMode = !!(payload.columnSplitMode);
    let colGroups = Array.isArray(payload.columnGroups) ? payload.columnGroups : [];
    function hex(c){if((c||"").startsWith("#")) return c; const d=document.createElement("div"); d.style.color=c||"#fff"; document.body.appendChild(d); const rgb=getComputedStyle(d).color; d.remove(); const n=rgb.match(/\\d+/g).map(Number); return "#" + n.slice(0,3).map(v=>v.toString(16).padStart(2,"0")).join("");}
    function shade(c,o){const h=hex(c),n=parseInt(h.slice(1),16),r=Math.max(0,Math.min(255,((n>>16)&255)+o)),g=Math.max(0,Math.min(255,((n>>8)&255)+o)),b=Math.max(0,Math.min(255,(n&255)+o));return "#" + [r,g,b].map(v=>v.toString(16).padStart(2,"0")).join("")}
    function coloredAvatar(c){const bg=c||"#ede3d8";const fg=shade(bg,-50);const svg='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" fill="'+bg+'"/><circle cx="32" cy="21" r="12" fill="'+fg+'"/><path d="M32,33 C18,33 8,43 8,58 L8,64 L56,64 L56,58 C56,43 46,33 32,33 Z" fill="'+fg+'"/></svg>';return "data:image/svg+xml;base64,"+btoa(unescape(encodeURIComponent(svg)));}
    function getCounts(){const m={}; entries.forEach(e=>m[e.attr]=(m[e.attr]||0)+1); return m;}
    function readAsDataUrl(file){return new Promise((resolve,reject)=>{const r=new FileReader(); r.onload=()=>resolve(String(r.result||"")); r.onerror=()=>reject(r.error); r.readAsDataURL(file);});}
    function speakerVisible(e){if(!e.speaker) return true; const cfg=charMap[e.speaker]; if(!cfg) return true; return cfg.visible !== false;}
    function nodeFor(it){const e=document.createElement("div"); e.className="entry"; const img=document.createElement("img"); img.className="entry-avatar"; img.alt=""; const b=document.createElement("article"); b.className="bubble"; const m=document.createElement("div"); m.className="meta"; const t=document.createElement("span"); t.className="tag"; t.textContent=(it.attr==="NO_ATTR")?"(属性なし)":it.attr; const n=document.createElement("span"); n.className="name"; const l=document.createElement("div"); l.className="line"; l.textContent=it.text; m.append(t,n); b.append(m,l);
      if(it.kind==="narration"||!it.speaker){e.classList.add("narration"); n.textContent="地の文"; img.src=defaultAvatar;}
      else {const cfg=charMap[it.speaker]||{}; n.textContent=it.speaker; img.src=cfg.icon||coloredAvatar(cfg.color); b.style.background=cfg.color||"#fff"; b.style.borderColor=shade(cfg.color||"#fff",-30);}
      e.append(img,b); return e;}
    function renderAttrs(){attrsBox.innerHTML=""; const c=getCounts(); const keys=Object.keys(c); if(!keys.length){attrsBox.textContent="属性なし"; return;} keys.forEach(a=>{const row=document.createElement("label"); row.className="row"; const ck=document.createElement("input"); ck.type="checkbox"; ck.checked=activeAttrs.has(a); ck.onchange=()=>{ck.checked?activeAttrs.add(a):activeAttrs.delete(a); renderAll();}; const text=document.createElement("span"); text.textContent=((a==="NO_ATTR")?"(属性なし)":a)+" ("+c[a]+")"; row.append(ck,text); attrsBox.append(row);});}
    function renderChars(){charsBox.innerHTML=""; const names=Object.keys(charMap); if(!names.length){charsBox.textContent="キャラなし"; return;} names.forEach(name=>{const cfg=charMap[name]||{}; const row=document.createElement("div"); row.className="char-row";
      const vis=document.createElement("input"); vis.type="checkbox"; vis.className="char-toggle"; vis.checked=cfg.visible!==false; vis.onchange=()=>{cfg.visible=vis.checked; renderAll();};
      const nameEl=document.createElement("div"); nameEl.className="char-name"; nameEl.textContent=name; nameEl.title=name;
      const color=document.createElement("input"); color.type="color"; color.value=hex(cfg.color||"#ffffff"); color.style.cssText="width:28px;height:26px;padding:0;border:1px solid #bfa98f;border-radius:6px;cursor:pointer;flex-shrink:0"; color.oninput=()=>{cfg.color=color.value; renderAll();};
      const thumb=document.createElement("img"); thumb.className="icon-thumb"; thumb.src=cfg.icon||coloredAvatar(cfg.color); thumb.alt=name;
      const file=document.createElement("input"); file.type="file"; file.accept="image/*"; file.style.display="none"; file.onchange=async()=>{const f=file.files&&file.files[0]; if(!f) return; cfg.icon=await readAsDataUrl(f); thumb.src=cfg.icon; renderAll();};
      const lbl=document.createElement("label"); lbl.className="char-icon-label"; lbl.textContent="アイコン変更"; lbl.appendChild(file);
      const top=document.createElement("div"); top.className="char-row-top"; top.append(vis,nameEl);
      const btm=document.createElement("div"); btm.className="char-row-bottom"; btm.append(color,thumb,lbl);
      row.append(top,btm); charsBox.append(row);});}
    function renderColFlow(visible,flow){const groups=colGroups.filter(g=>Array.isArray(g.attrs)&&g.attrs.length>0);const anchor=groups[0]?.attrs||[];const N=groups.length;if(!N){visible.forEach(it=>flow.appendChild(nodeFor(it)));return;}const g=document.createElement("div");g.className="col-layout";const cd=["minmax(260px,1fr)"];for(let i=1;i<N;i++)cd.push("3px","minmax(260px,1fr)");g.style.gridTemplateColumns=cd.join(" ");groups.forEach((group,i)=>{if(i>0){const d=document.createElement("div");d.className="col-div-cell";g.append(d);}const h=document.createElement("div");h.className="col-header";h.textContent=group.attrs.map(a=>a==="NO_ATTR"?"(属性なし)":a).join(" / ")||("列"+(i+1));g.append(h);});visible.forEach(item=>{const si=groups.findIndex(group=>group.attrs.includes(item.attr));groups.forEach((group,i)=>{if(i>0){const dc=document.createElement("div");dc.className="col-div-cell";g.append(dc);}const sc=document.createElement("div");sc.className="col-cell"+(si===i?"":" col-empty");if(si===i){sc.appendChild(nodeFor(item));}else if(!anchor.includes(item.attr)&&i===0){sc.className="col-cell col-ghost";sc.appendChild(nodeFor(item));}g.append(sc);});});flow.appendChild(g);}
    function renderColAssign(){const box=document.getElementById("colAssign");box.innerHTML="";if(!colGroups.length){box.textContent="列設定なし";return;}colGroups.forEach((group,i)=>{const row=document.createElement("div");row.className="row";row.textContent=(group.attrs&&group.attrs.length)?group.attrs.map(a=>a==="NO_ATTR"?"(属性なし)":a).join(" / "):("列"+(i+1));box.append(row);});}
    function renderAll(){const visible=entries.filter(e=>activeAttrs.has(e.attr)&&speakerVisible(e));progress.textContent=visible.length+"件";flow.innerHTML="";if(!visible.length){const note=document.createElement("div");note.className="line";note.textContent="表示対象がありません";flow.append(note);return;}if(colMode&&colGroups.some(g=>Array.isArray(g.attrs)&&g.attrs.length>0)){renderColFlow(visible,flow);}else{visible.forEach(it=>flow.appendChild(nodeFor(it)));}}
    document.getElementById("attrOn").onclick=()=>{activeAttrs=new Set(Object.keys(getCounts())); renderAttrs(); renderAll();};
    document.getElementById("attrOff").onclick=()=>{activeAttrs=new Set(); renderAttrs(); renderAll();};
    document.querySelectorAll('input[name="vm"]').forEach(r=>{if((r.value==="c")===colMode)r.checked=true;r.onchange=()=>{colMode=r.value==="c";document.getElementById("colAssign").style.display=colMode?"":"none";renderAll();};});
    document.getElementById("colAssign").style.display=colMode?"":"none";
    renderAttrs(); renderColAssign(); renderChars(); renderAll();
  <\/script>
</body>
</html>`;
    }

    function buildStaticExportHtml(visibleEntries, charMap, isColMode, columnGroups) {
      // キャラクターごとに色・アイコンを1回だけCSSに書き出す
      const charIndex = {};
      const charCssLines = [];
      let ci = 0;
      Object.keys(charMap).forEach((name) => {
        const cfg = charMap[name] || {};
        const bgColor = toHex(cfg.color || "#fff");
        const borderColor = shadeColor(bgColor, -30);
        const avatarSrc = cfg.icon || coloredAvatar(bgColor);
        const idx = ci++;
        charIndex[name] = { idx, bgColor, borderColor, avatarSrc };
        charCssLines.push(
          `.av-${idx}{background-image:url('${avatarSrc}')}`,
          `.bub-${idx}{background:${bgColor};border-color:${borderColor}}`
        );
      });
      const charCss = charCssLines.join("\n    ");

      const makeEntryHtml = (item) => {
        const attrText = item.attr === "NO_ATTR" ? "(属性なし)" : esc(item.attr);
        if (item.kind === "narration" || !item.speaker) {
          return `<div class="entry narration"><article class="bubble narration-bubble">` +
            `<div class="meta"><span class="tag">${attrText}</span><span class="name">地の文</span></div>` +
            `<div class="line">${esc(item.text)}</div></article></div>`;
        }
        const c = charIndex[item.speaker];
        if (c) {
          return `<div class="entry"><div class="entry-avatar av-${c.idx}"></div>` +
            `<article class="bubble bub-${c.idx}">` +
            `<div class="meta"><span class="tag">${attrText}</span><span class="name">${esc(item.speaker)}</span></div>` +
            `<div class="line">${esc(item.text)}</div></article></div>`;
        }
        return `<div class="entry"><div class="entry-avatar"></div>` +
          `<article class="bubble">` +
          `<div class="meta"><span class="tag">${attrText}</span><span class="name">${esc(item.speaker)}</span></div>` +
          `<div class="line">${esc(item.text)}</div></article></div>`;
      };

      const groups = isColMode && Array.isArray(columnGroups)
        ? columnGroups.filter((group) => Array.isArray(group?.attrs) && group.attrs.length > 0)
        : [];
      const anchorAttrs = groups[0]?.attrs || [];
      const useColLayout = groups.length > 0;

      let bodyHtml;
      if (useColLayout) {
        const colDef = ['minmax(260px,1fr)', ...groups.slice(1).flatMap(() => ['3px', 'minmax(260px,1fr)'])].join(' ');
        let headerHtml = '';
        groups.forEach((group, index) => {
          if (index > 0) headerHtml += `<div class="col-div-cell"></div>`;
          const label = group.attrs.map((attr) => attr === 'NO_ATTR' ? '(属性なし)' : attr).join(' / ') || `列${index + 1}`;
          headerHtml += `<div class="col-header">${esc(label)}</div>`;
        });
        let cellsHtml = '';
        for (const item of visibleEntries) {
          const si = groups.findIndex((group) => group.attrs.includes(item.attr));
          groups.forEach((group, i) => {
            if (i > 0) cellsHtml += `<div class="col-div-cell"></div>`;
            if (si === i) {
              cellsHtml += `<div class="col-cell">${makeEntryHtml(item)}</div>`;
            } else if (!anchorAttrs.includes(item.attr) && i === 0) {
              cellsHtml += `<div class="col-cell col-ghost">${makeEntryHtml(item)}</div>`;
            } else {
              cellsHtml += `<div class="col-cell col-empty"></div>`;
            }
          });
        }
        bodyHtml = `<div class="col-layout" style="grid-template-columns:${colDef}">${headerHtml}${cellsHtml}</div>`;
      } else {
        bodyHtml = `<div class="flow">\n${visibleEntries.map(makeEntryHtml).join("\n")}\n    </div>`;
      }

      const colLayoutCss = useColLayout
        ? `.col-layout{display:grid;width:100%;align-items:start;overflow-x:auto}.col-header{font-size:12px;font-weight:700;text-align:center;padding:6px 4px;background:#f1e5d7;border-bottom:1px solid #cdb79f;position:sticky;top:0;z-index:2}.col-div-cell{background:#cdb79f;align-self:stretch}.col-cell{padding:4px;min-width:0}.col-cell .entry-avatar{width:52px!important;height:52px!important}.col-cell .bubble{max-width:100%!important;padding:8px 10px!important}.col-cell .line{font-size:13px!important}.col-cell .meta{font-size:10px!important}.col-cell .name{font-size:11px!important}.col-cell.col-empty{padding:0}.col-cell.col-ghost .entry{visibility:hidden;pointer-events:none}`
        : '';

      return `<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TRPG Comic Viewer</title>
  <style>
    body{margin:0;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic UI","Meiryo",sans-serif;background:linear-gradient(145deg,#f7f1dc,#f9d8b6);color:#2f2a22;min-height:100vh}
    .root{max-width:1100px;margin:0 auto;padding:20px 16px}
    .flow{display:flex;flex-direction:column;gap:10px}
    .entry{display:flex;gap:10px;align-items:flex-end}
    .entry-avatar{width:76px;height:76px;border-radius:50%;border:3px solid #f4e3cc;background:#fff center/cover no-repeat;flex-shrink:0}
    .bubble{max-width:min(760px,92%);border-radius:16px;border:2px solid #cdb79f;background:#fff;padding:12px 14px;box-shadow:0 8px 16px rgba(0,0,0,.08)}
    .meta{display:flex;gap:8px;align-items:center;margin-bottom:6px;font-size:12px}
    .tag{background:#f1e5d7;border:1px solid #ddc9b2;border-radius:999px;padding:2px 8px;font-size:11px}
    .name{font-weight:700;font-size:13px}
    .line{white-space:pre-wrap;line-height:1.6;font-size:17px;color:#231f1b}
    .entry.narration{justify-content:center}
    .entry.narration .entry-avatar{display:none}
    .narration-bubble{margin:0 auto;max-width:900px;text-align:center;border-style:dashed;background:#fffefb!important;border-color:#d8c8b4!important}
    .narration-bubble .line{color:#4f4437}
    @media(max-width:760px){.entry-avatar{width:60px;height:60px}.line{font-size:15px}}
    ${colLayoutCss}
    ${charCss}
  </style>
</head>
<body>
  <div class="root">
    ${bodyHtml}
  </div>
</body>
</html>`;
    }

    function esc(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    async function buildEpub(payload) {
      const bookId = `urn:uuid:${crypto.randomUUID()}`;
      const title = payload.title || "TRPG Log";
      const chunks = chunkEntries(payload.entries || [], 120);
      const navItems = [];
      const manifest = [
        '<item id="nav" href="nav.xhtml" media-type="application/xhtml+xml" properties="nav"/>',
        '<item id="style" href="styles/book.css" media-type="text/css"/>',
      ];
      const spine = [];
      const imageBundle = buildEpubImageBundle(payload.charMap || {});
      const files = [
        {
          path: "mimetype",
          data: "application/epub+zip",
          text: true,
          compress: false,
        },
        {
          path: "META-INF/container.xml",
          data: `<?xml version="1.0" encoding="UTF-8"?>
<container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container">
  <rootfiles>
    <rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/>
  </rootfiles>
</container>`,
          text: true,
        },
        {
          path: "OEBPS/styles/book.css",
          data: buildEpubCss(),
          text: true,
        },
        ...imageBundle.files,
      ];
      manifest.push(...imageBundle.manifest);

      chunks.forEach((items, index) => {
        const href = `text/chapter-${index + 1}.xhtml`;
        const id = `chapter-${index + 1}`;
        const label = `第${index + 1}章`;
        navItems.push({ href, label });
        manifest.push(`<item id="${id}" href="${href}" media-type="application/xhtml+xml"/>`);
        spine.push(`<itemref idref="${id}"/>`);
        files.push({
          path: `OEBPS/${href}`,
          data: buildEpubChapterXhtml(title, label, items, payload.charMap || {}, imageBundle.refs),
          text: true,
        });
      });

      files.push({
        path: "OEBPS/nav.xhtml",
        data: buildEpubNavXhtml(title, navItems),
        text: true,
      });
      files.push({
        path: "OEBPS/content.opf",
        data: buildContentOpf({
          id: bookId,
          title,
          modified: new Date().toISOString().replace(/\.\d{3}Z$/, "Z"),
          manifest,
          spine,
        }),
        text: true,
      });

      return createZip(files);
    }

    function deriveBaseName(name) {
      return String(name || "trpg-log")
        .replace(/\.[^.]+$/, "")
        .trim()
        .replace(/[\\/:*?"<>|]+/g, "_") || "trpg-log";
    }

    function chunkEntries(list, size) {
      const out = [];
      for (let i = 0; i < list.length; i += size) out.push(list.slice(i, i + size));
      return out.length ? out : [[]];
    }

    function buildEpubCss() {
      return `@namespace epub "http://www.idpf.org/2007/ops";
body{margin:0;padding:0 0.8rem;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic UI","Meiryo",sans-serif;background:#f7f1dc;color:#2f2a22}
h1,h2{font-weight:700;line-height:1.3}
section{padding:0.5rem 0.2rem 1.5rem}
.chapter-title{margin:1rem 0 1rem;font-size:1.4rem;border-bottom:2px solid #cdb79f;padding-bottom:0.4rem}
.entry{display:table;width:100%;table-layout:fixed;margin:0 0 1rem;page-break-inside:avoid;border-spacing:0}
.entry-avatar-wrap,.entry-bubble-wrap{display:table-cell;vertical-align:bottom}
.entry-avatar-wrap{width:5.6rem;padding-right:0.6rem}
.entry-avatar{display:block;width:4.8rem;height:4.8rem;border-radius:50%;border:3px solid #f4e3cc;object-fit:cover;background:#fff}
.bubble{border-radius:1rem;border:2px solid #cdb79f;background:#fffdf8;padding:0.75rem 0.9rem}
.meta{margin:0 0 0.4rem;font-size:0.75rem;color:#6a5948;display:block}
.tag{display:inline-block;margin-right:0.4rem;padding:0.1rem 0.5rem;border:1px solid #ddc9b2;border-radius:999px;background:#f1e5d7;font-size:0.7rem}
.speaker{font-weight:700;font-size:0.85rem}
.line{white-space:pre-wrap;line-height:1.7;font-size:1.05rem}
.entry.narration{display:block}
.entry.narration .entry-avatar-wrap{display:none}
.entry.narration .bubble{margin:0 auto;max-width:90%;text-align:center;border-style:dashed;background:#fffefb;border-color:#d8c8b4;color:#4f4437}
.toc ol{padding-left:1.2rem}
.toc li{margin:0.5rem 0;font-size:1rem}`;
    }

    function buildEpubChapterXhtml(bookTitle, chapterTitle, items, chars, imageRefs) {
      const body = items.map((item) => buildEpubEntryHtml(item, chars, imageRefs)).join("\n");
      return `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:epub="http://www.idpf.org/2007/ops" lang="ja" xml:lang="ja">
<head>
  <meta charset="UTF-8"/>
  <title>${esc(chapterTitle)} | ${esc(bookTitle)}</title>
  <link rel="stylesheet" type="text/css" href="../styles/book.css"/>
</head>
<body>
  <section>
    <h1 class="chapter-title">${esc(chapterTitle)}</h1>
    ${body || "<p>表示できるログがありません。</p>"}
  </section>
</body>
</html>`;
    }

    function buildEpubEntryHtml(item, chars, imageRefs) {
      const attrLabel = item.attr === "NO_ATTR" ? "(属性なし)" : (item.attr || "");
      const textHtml = esc(item.text || "").replace(/\n/g, "<br/>");
      if (item.kind === "narration" || !item.speaker) {
        return `<article class="entry narration"><div class="entry-bubble-wrap"><div class="bubble"><div class="meta"><span class="tag">${esc(attrLabel)}</span><span class="speaker">地の文</span></div><div class="line">${textHtml}</div></div></div></article>`;
      }
      const cfg = chars[item.speaker] || {};
      const bg = esc(cfg.color || "#fffdf8");
      const border = esc(shadeColor(cfg.color || "#fffdf8", -30));
      const icon = esc(imageRefs[item.speaker] || imageRefs.__default || "../images/default-avatar.png");
      return `<article class="entry"><div class="entry-avatar-wrap"><img class="entry-avatar" src="${icon}" alt=""/></div><div class="entry-bubble-wrap"><div class="bubble" style="background:${bg};border-color:${border}"><div class="meta"><span class="tag">${esc(attrLabel)}</span><span class="speaker">${esc(item.speaker || "")}</span></div><div class="line">${textHtml}</div></div></div></article>`;
    }

    function buildEpubNavXhtml(title, items) {
      const list = items.map((item) => `<li><a href="${esc(item.href)}">${esc(item.label)}</a></li>`).join("");
      return `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:epub="http://www.idpf.org/2007/ops" lang="ja" xml:lang="ja">
<head>
  <meta charset="UTF-8"/>
  <title>${esc(title)} 目次</title>
  <link rel="stylesheet" type="text/css" href="styles/book.css"/>
</head>
<body>
  <section class="toc">
    <h1>${esc(title)}</h1>
    <nav epub:type="toc" id="toc">
      <h2>目次</h2>
      <ol>${list}</ol>
    </nav>
  </section>
</body>
</html>`;
    }

    function buildContentOpf({ id, title, modified, manifest, spine }) {
      return `<?xml version="1.0" encoding="UTF-8"?>
<package version="3.0" xmlns="http://www.idpf.org/2007/opf" unique-identifier="bookid" xml:lang="ja">
  <metadata xmlns:dc="http://purl.org/dc/elements/1.1/">
    <dc:identifier id="bookid">${esc(id)}</dc:identifier>
    <dc:title>${esc(title)}</dc:title>
    <dc:language>ja</dc:language>
    <meta property="dcterms:modified">${esc(modified)}</meta>
  </metadata>
  <manifest>
    ${manifest.join("\n    ")}
  </manifest>
  <spine>
    ${spine.join("\n    ")}
  </spine>
</package>`;
    }

    function buildEpubImageBundle(chars) {
      const files = [];
      const manifest = [];
      const defaultAsset = dataUrlToAsset(defaultAvatar, "default-avatar");
      const refs = { __default: `../images/${defaultAsset.fileName}` };
      files.push({
        path: `OEBPS/images/${defaultAsset.fileName}`,
        data: defaultAsset.bytes,
        text: false,
      });
      manifest.push(`<item id="img-default-avatar" href="images/${defaultAsset.fileName}" media-type="${defaultAsset.mediaType}"/>`);

      Object.entries(chars).forEach(([name, cfg], index) => {
        const src = cfg?.icon;
        if (!src || src === defaultAvatar) {
          refs[name] = refs.__default;
          return;
        }
        const asset = dataUrlToAsset(src, `speaker-${index + 1}`);
        if (!asset) {
          refs[name] = refs.__default;
          return;
        }
        refs[name] = `../images/${asset.fileName}`;
        files.push({
          path: `OEBPS/images/${asset.fileName}`,
          data: asset.bytes,
          text: false,
        });
        manifest.push(`<item id="img-speaker-${index + 1}" href="images/${asset.fileName}" media-type="${asset.mediaType}"/>`);
      });

      return { refs, files, manifest };
    }

    function dataUrlToAsset(dataUrl, baseName) {
      const match = String(dataUrl || "").match(/^data:([^;]+);base64,(.+)$/);
      if (!match) return null;
      const mediaType = match[1];
      const ext = mediaType.split("/")[1]?.replace("svg+xml", "svg") || "bin";
      const binary = atob(match[2]);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return {
        mediaType,
        fileName: `${baseName}.${ext}`,
        bytes,
      };
    }

    async function createZip(entries) {
      const encoder = new TextEncoder();
      const localParts = [];
      const centralParts = [];
      let offset = 0;

      for (const entry of entries) {
        const nameBytes = encoder.encode(entry.path);
        const dataBytes = entry.text ? encoder.encode(entry.data) : entry.data;
        const crc = crc32(dataBytes);
        const localHeader = new Uint8Array(30 + nameBytes.length);
        const localView = new DataView(localHeader.buffer);
        localView.setUint32(0, 0x04034b50, true);
        localView.setUint16(4, 20, true);
        localView.setUint16(6, 0, true);
        localView.setUint16(8, entry.compress === false ? 0 : 0, true);
        localView.setUint16(10, 0, true);
        localView.setUint16(12, 0, true);
        localView.setUint32(14, crc >>> 0, true);
        localView.setUint32(18, dataBytes.length, true);
        localView.setUint32(22, dataBytes.length, true);
        localView.setUint16(26, nameBytes.length, true);
        localView.setUint16(28, 0, true);
        localHeader.set(nameBytes, 30);
        localParts.push(localHeader, dataBytes);

        const centralHeader = new Uint8Array(46 + nameBytes.length);
        const centralView = new DataView(centralHeader.buffer);
        centralView.setUint32(0, 0x02014b50, true);
        centralView.setUint16(4, 20, true);
        centralView.setUint16(6, 20, true);
        centralView.setUint16(8, 0, true);
        centralView.setUint16(10, entry.compress === false ? 0 : 0, true);
        centralView.setUint16(12, 0, true);
        centralView.setUint16(14, 0, true);
        centralView.setUint32(16, crc >>> 0, true);
        centralView.setUint32(20, dataBytes.length, true);
        centralView.setUint32(24, dataBytes.length, true);
        centralView.setUint16(28, nameBytes.length, true);
        centralView.setUint16(30, 0, true);
        centralView.setUint16(32, 0, true);
        centralView.setUint16(34, 0, true);
        centralView.setUint16(36, 0, true);
        centralView.setUint32(38, 0, true);
        centralView.setUint32(42, offset, true);
        centralHeader.set(nameBytes, 46);
        centralParts.push(centralHeader);

        offset += localHeader.length + dataBytes.length;
      }

      const centralSize = centralParts.reduce((sum, part) => sum + part.length, 0);
      const end = new Uint8Array(22);
      const endView = new DataView(end.buffer);
      endView.setUint32(0, 0x06054b50, true);
      endView.setUint16(4, 0, true);
      endView.setUint16(6, 0, true);
      endView.setUint16(8, entries.length, true);
      endView.setUint16(10, entries.length, true);
      endView.setUint32(12, centralSize, true);
      endView.setUint32(16, offset, true);
      endView.setUint16(20, 0, true);

      return concatUint8Arrays([...localParts, ...centralParts, end]);
    }

    function concatUint8Arrays(parts) {
      const total = parts.reduce((sum, part) => sum + part.length, 0);
      const out = new Uint8Array(total);
      let offset = 0;
      for (const part of parts) {
        out.set(part, offset);
        offset += part.length;
      }
      return out;
    }

    const crcTable = (() => {
      const table = new Uint32Array(256);
      for (let n = 0; n < 256; n++) {
        let c = n;
        for (let k = 0; k < 8; k++) {
          c = (c & 1) ? (0xedb88320 ^ (c >>> 1)) : (c >>> 1);
        }
        table[n] = c >>> 0;
      }
      return table;
    })();

    function crc32(bytes) {
      let crc = 0xffffffff;
      for (let i = 0; i < bytes.length; i++) {
        crc = crcTable[(crc ^ bytes[i]) & 0xff] ^ (crc >>> 8);
      }
      return (crc ^ 0xffffffff) >>> 0;
    }
  </script>
</body>
</html>
